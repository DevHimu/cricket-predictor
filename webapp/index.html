<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Cricket Live Predictor</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;700;900&family=Space+Grotesk:wght@400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#0A111F; --card:#111C31; --line:#22314F;
  --ink:#E8EEF9; --muted:#8FA3C4; --dim:#5E7398;
  --amber:#FFB020; --cyan:#3FC8E4; --red:#FF5568; --blue:#4C8DFF; --green:#37C98B;
}
*{box-sizing:border-box; margin:0; padding:0}
body{background:var(--bg); color:var(--ink); font-family:'Space Grotesk',system-ui,sans-serif;
     -webkit-font-smoothing:antialiased}
.wrap{max-width:1080px; margin:0 auto; padding:18px 16px 60px}
.mono{font-family:'Space Mono',monospace}

.top{display:flex; align-items:center; justify-content:space-between; margin-bottom:18px}
.brand{font-family:'Archivo'; font-weight:900; font-size:15px; letter-spacing:.16em; color:var(--amber)}
.brand small{display:block; font-family:'Space Mono'; font-size:9px; letter-spacing:.2em;
             color:var(--dim); font-weight:400}
.eyebrow{font-family:'Space Mono'; font-size:10px; letter-spacing:.16em; color:var(--dim); text-transform:uppercase}

.back{background:none; border:1px solid var(--line); color:var(--muted); font-family:'Space Mono';
      font-size:11px; letter-spacing:.1em; padding:7px 12px; border-radius:7px; cursor:pointer; margin-bottom:14px}
.back:hover{border-color:var(--amber); color:var(--amber)}

.livetile{display:block; width:100%; text-align:left; background:linear-gradient(160deg,#16233C,#101B2E);
  border:1px solid #2A3C5E; border-left:3px solid var(--red); border-radius:14px; padding:16px;
  cursor:pointer; margin-bottom:12px; transition:.15s}
.livetile:hover{border-color:var(--amber); transform:translateY(-1px)}
.livehead{display:flex; align-items:center; gap:7px; margin-bottom:9px}
.pulse{width:7px; height:7px; border-radius:50%; background:var(--red); animation:p 1.4s infinite}
@keyframes p{0%,100%{opacity:1}50%{opacity:.25}}
.livelabel{font-family:'Space Mono'; font-size:10px; letter-spacing:.18em; color:var(--red); font-weight:700}
.matchup{font-family:'Archivo'; font-weight:700; font-size:17px; margin-bottom:8px}
.tilescore{display:flex; align-items:baseline; gap:10px}
.tilescore .s{font-family:'Archivo'; font-weight:900; font-size:27px; color:var(--amber)}
.tilescore .o{font-family:'Space Mono'; font-size:11px; color:var(--muted)}
.tilehint{margin-top:9px; font-family:'Space Mono'; font-size:10px; color:var(--dim)}
.grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(250px,1fr)); gap:11px}
.card{display:block; text-align:left; background:var(--card); border:1px solid var(--line);
      border-radius:12px; padding:14px; cursor:pointer; transition:.15s}
.card:hover{border-color:var(--amber); transform:translateY(-1px)}
.card .vs{font-family:'Archivo'; font-weight:700; font-size:14px; margin-bottom:5px}
.card .res{font-size:11.5px; color:var(--green); margin-bottom:7px}
.card .meta{display:flex; justify-content:space-between; font-family:'Space Mono'; font-size:10px; color:var(--dim)}

.sec{margin:26px 0 12px}
.sec h2{font-family:'Archivo'; font-weight:700; font-size:14px; letter-spacing:.1em;
        text-transform:uppercase; color:var(--ink)}
.sec .rule{height:2px; background:linear-gradient(90deg,var(--amber),transparent);
           margin-top:6px; border-radius:2px}

.board{background:linear-gradient(165deg,#16233C,#0E1829); border:1px solid #2A3C5E;
       border-radius:16px; padding:18px; margin-bottom:14px}
.venue{font-family:'Space Mono'; font-size:10px; letter-spacing:.14em; color:var(--dim);
       text-transform:uppercase; margin-bottom:12px}
.scoreline{display:flex; align-items:flex-end; justify-content:space-between; flex-wrap:wrap; gap:12px}
.bigscore{font-family:'Archivo'; font-weight:900; font-size:52px; line-height:1; color:var(--amber)}
.bigscore span{font-size:24px; color:var(--muted)}
.scoremeta{font-family:'Space Mono'; font-size:11.5px; color:var(--muted); margin-top:6px}
.batlabel{font-size:13px; color:var(--ink); font-weight:500; margin-bottom:4px}
.chase{text-align:right}
.chase .need{font-family:'Archivo'; font-weight:700; font-size:17px; color:var(--cyan)}
.rates{display:flex; gap:18px; margin-top:14px; padding-top:12px; border-top:1px solid var(--line);
       font-family:'Space Mono'; font-size:11px; color:var(--dim)}
.rates b{color:var(--ink); font-size:13px}

.crease{display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:14px}
.player{background:var(--card); border:1px solid var(--line); border-radius:11px; padding:12px}
.player.strike{border-color:var(--amber); background:linear-gradient(160deg,#1B2740,#141F35)}
.role{font-family:'Space Mono'; font-size:9px; letter-spacing:.15em; color:var(--dim);
      text-transform:uppercase; margin-bottom:5px; display:flex; align-items:center; gap:5px}
.player.strike .role{color:var(--amber)}
.dt{width:5px; height:5px; border-radius:50%; background:var(--amber)}
.pname{font-family:'Archivo'; font-weight:700; font-size:15px; margin-bottom:3px}
.pstat{font-family:'Space Mono'; font-size:11px; color:var(--muted)}
.pstat b{color:var(--ink); font-size:13px}
.bowlnow{background:var(--card); border:1px solid var(--line); border-radius:11px;
         padding:12px; margin-bottom:14px}

.predbox{background:var(--card); border:1px solid var(--line); border-radius:13px;
         padding:15px; margin-bottom:12px}
.predtitle{font-family:'Space Mono'; font-size:10px; letter-spacing:.15em; color:var(--dim);
           text-transform:uppercase; margin-bottom:10px}
.projrow{display:flex; align-items:baseline; gap:12px}
.projval{font-family:'Archivo'; font-weight:900; font-size:40px; color:var(--amber); line-height:1}
.projnote{font-family:'Space Mono'; font-size:11px; color:var(--dim)}
.tag{display:inline-block; font-family:'Space Mono'; font-size:9px; letter-spacing:.1em;
     padding:3px 7px; border-radius:5px; background:#20304E; color:var(--muted); margin-left:6px}

.wprow{display:flex; justify-content:space-between; align-items:center; margin-bottom:7px}
.wpteam{font-size:13px; font-weight:500}
.wppct{font-family:'Archivo'; font-weight:900; font-size:22px}
.wptrack{height:26px; border-radius:8px; overflow:hidden; display:flex; background:#0C1526;
         border:1px solid var(--line)}
.wpfill{display:flex; align-items:center; padding:0 9px; font-family:'Space Mono'; font-size:11px;
        font-weight:700; transition:width .5s cubic-bezier(.4,0,.2,1); overflow:hidden; white-space:nowrap}
.wpa{background:linear-gradient(90deg,#C97B12,var(--amber)); color:#0A111F; justify-content:flex-start}
.wpb{background:linear-gradient(90deg,#1E6B80,var(--cyan)); color:#0A111F; justify-content:flex-end}
.wpfoot{display:flex; justify-content:space-between; margin-top:6px; font-family:'Space Mono';
        font-size:10px; color:var(--dim)}

.balls{display:flex; gap:5px; margin-top:13px; flex-wrap:wrap}
.b{width:27px; height:27px; border-radius:50%; display:flex; align-items:center; justify-content:center;
   font-family:'Space Mono'; font-size:11px; font-weight:700; background:#1C2942; color:var(--muted)}
.b.four{background:var(--cyan); color:#08131A}
.b.six{background:var(--amber); color:#1A1204}
.b.w{background:var(--red); color:#fff}

.charts{display:grid; grid-template-columns:1fr 1fr; gap:12px}
@media(max-width:820px){.charts{grid-template-columns:1fr} .crease{grid-template-columns:1fr}}
.chart{background:var(--card); border:1px solid var(--line); border-radius:12px; padding:14px}
.chart h3{font-family:'Space Mono'; font-size:10px; letter-spacing:.13em; color:var(--muted);
          text-transform:uppercase; margin-bottom:3px}
.chart .sub{font-family:'Space Mono'; font-size:9.5px; color:var(--dim); margin-bottom:11px}
.chart.full{grid-column:1/-1}
.empty{font-family:'Space Mono'; font-size:11px; color:var(--dim); padding:14px 0; text-align:center}

.best{display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:14px}
@media(max-width:820px){.best{grid-template-columns:1fr}}
.bestcard{background:linear-gradient(160deg,#1A2740,#111C31); border:1px solid #2A3C5E;
          border-radius:13px; padding:15px; position:relative}
.bestcard .lbl{font-family:'Space Mono'; font-size:9px; letter-spacing:.15em; color:var(--amber);
               text-transform:uppercase; margin-bottom:7px}
.bestcard .bname{font-family:'Archivo'; font-weight:900; font-size:21px; margin-bottom:3px}
.bestcard .bteam{font-family:'Space Mono'; font-size:10px; color:var(--dim); margin-bottom:9px}
.bestcard .bstat{font-family:'Space Mono'; font-size:12px; color:var(--muted)}
.bestcard .bstat b{color:var(--ink); font-size:15px}

.result{background:linear-gradient(160deg,#14301F,#0F2418); border:1px solid #2A5C3E;
        border-left:3px solid var(--green); border-radius:13px; padding:15px; margin-bottom:14px}
.result .rl{font-family:'Space Mono'; font-size:9.5px; letter-spacing:.15em; color:var(--green);
            text-transform:uppercase; margin-bottom:6px}
.result .rt{font-family:'Archivo'; font-weight:700; font-size:19px}

.err{background:#2A1520; border:1px solid var(--red); border-left:3px solid var(--red);
     border-radius:11px; padding:14px; font-family:'Space Mono'; font-size:12px;
     color:#FFB8C2; line-height:1.6}
.err code{background:#0C1526; padding:2px 5px; border-radius:4px; color:var(--amber)}
.loading{font-family:'Space Mono'; font-size:12px; color:var(--dim); padding:22px; text-align:center}
</style>
</head>
